name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: 🚀 Features
    labels:
      - feature
  - title: 🐛 Fixes
    labels:
      - bug
  - title: 🛠 Chores
    labels:
      - chore
  - title: 📚 Documentation
    labels:
      - docs
  - title: 📦 Dependencies
    labels:
      - dependencies
change-template: '- $TITLE (#$NUMBER) by @$AUTHOR'
template: |
  ## Changes
  $CHANGES